<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Car Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* กำหนดพื้นที่สำหรับสร้างระยะในการ Scroll (ยิ่งสูง ยิ่งต้องเลื่อนเมาส์เยอะกว่าจะเปลี่ยนรูป) */
        .scroll-container {
            height: 400vh; /* 400% ของความสูงหน้าจอ สำหรับ 4 รูป */
            position: relative;
        }

        /* ตรึงส่วนแสดงผลให้อยู่กับที่กลางหน้าจอ */
        .viewer-sticky {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* จัดการตำแหน่งของรูปภาพให้อยู่ทับกันพอดี */
        .image-wrapper {
            position: relative;
            width: 80vw;
            max-width: 1000px;
            aspect-ratio: 16/9;
        }

        .car-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0; /* ซ่อนรูปภาพไว้ก่อน */
            transition: opacity 0.4s ease-in-out; /* เพิ่มความนุ่มนวลตอนเปลี่ยนรูป */
        }

        /* คลาสที่จะถูกเปิดใช้งานด้วย JavaScript เมื่อถึงระยะ Scroll */
        .car-image.active {
            opacity: 1;
        }

        /* ส่วนหัวข้อบอกใบ้ด้านบน */
        .instruction {
            position: absolute;
            top: 40px;
            color: #ffffff;
            font-size: 1.2rem;
            text-align: center;
            width: 100%;
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="viewer-sticky">
            <div class="instruction">Scroll Down to Rotate the Car</div>
            
            <div class="image-wrapper">
                <!-- ใส่พาธรูปภาพทั้ง 4 รูปของคุณที่นี่ -->
                <img src="images/project1-slide1.jpg" alt="Front" class="car-image active">
                <img src="images/project1-slide2.jpg" alt="Side" class="car-image">
                <img src="images/project1-slide3.jpg" alt="Rear" class="car-image">
                <img src="images/watermarked_img_5712597349868697082.png" alt="Top" class="car-image">
            </div>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('.car-image');
        const container = document.querySelector('.scroll-container');

        window.addEventListener('scroll', () => {
            // คำนวณหาเปอร์เซ็นต์การ Scroll ปัจจุบัน (0 ถึง 1)
            const scrollTop = window.scrollY;
            const maxScroll = container.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScroll;

            // นำเปอร์เซ็นต์มาแบ่งสัดส่วนตามจำนวนรูปภาพที่มี
            const totalImages = images.length;
            let imageIndex = Math.floor(scrollFraction * totalImages);

            // ป้องกันไม่ให้ Index เกินจำนวนรูปภาพ
            if (imageIndex >= totalImages) imageIndex = totalImages - 1;
            if (imageIndex < 0) imageIndex = 0;

            // วนลูปเพื่อเปิด/ปิด คลาส active ในการแสดงรูปภาพ
            images.forEach((img, index) => {
                if (index === imageIndex) {
                    img.classList.add('active');
                } else {
                    img.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
